name: Generate Snake

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  watch:
    types: [started]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Snake
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          gif_out_path: ./assets/github-contribution-grid-snake.gif
          svg_out_path: ./assets/github-contribution-grid-snake.svg

      - name: Push to GitHub
        uses: EndBug/add-and-commit@v7.2.1
        with:
          add: 'assets/github-contribution-grid-snake.gif assets/github-contribution-grid-snake.svg'
          branch: main
          message: 'Generate Contribution Snake'
